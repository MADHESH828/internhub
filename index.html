<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InternHub - Find Your Dream Internship</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<nav class="navbar">

<div class="container">

<h1 class="logo">InternHub</h1>

<ul class="nav-menu">

<li><a href="#">Home</a></li>
<li><a href="#internships">Internships</a></li>
<li><a href="#post">Post Internship</a></li>

</ul>

</div>

</nav>


<section class="hero">

<h1>Find Your Dream Internship</h1>

<p>Discover amazing opportunities in AI, Web Development, Data Science and more</p>

<div class="search-bar">

<input type="text" id="searchInput" placeholder="Search internships">

<button id="searchBtn">Search</button>

</div>

</section>


<section id="internships">

<h2>Featured Internships</h2>

<div id="internshipGrid" class="internship-grid"></div>

</section>


<section id="post" class="upload-section">

<h2>Post Internship</h2>

<form id="internshipForm">

<input type="text" id="title" placeholder="Internship Title" required>

<input type="text" id="company" placeholder="Company Name" required>

<input type="text" id="location" placeholder="Location" required>

<textarea id="description" placeholder="Description"></textarea>

<button type="submit">Post Internship</button>

</form>

</section>


<footer>

<p>© 2026 InternHub</p>

</footer>


<script src="script.js"></script>

</body>

</html>
