<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InternHub - Find Your Dream Internship</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<nav class="navbar">

<div class="container">

<h1 class="logo">InternHub</h1>

<ul class="nav-menu">

<li><a href="#">Home</a></li>
<li><a href="#internships">Internships</a></li>
<li><a href="#post">Post Internship</a></li>

</ul>

</div>

</nav>


<section class="hero">

<h1>Find Your Dream Internship</h1>

<p>Discover amazing opportunities in AI, Web Development, Data Science and more</p>

<div class="search-bar">

<input type="text" id="searchInput" placeholder="Search internships">

<button id="searchBtn">Search</button>

</div>

</section>


<section id="internships">

<h2>Featured Internships</h2>

<div id="internshipGrid" class="internship-grid"></div>

</section>


<section id="post" class="upload-section">

<h2>Post Internship</h2>

<form id="internshipForm">

<input type="text" id="title" placeholder="Internship Title" required>

<input type="text" id="company" placeholder="Company Name" required>

<input type="email" id="companyEmail" placeholder="Company Email" required>

<input type="text" id="location" placeholder="Location" required>

<textarea id="description" placeholder="Description"></textarea>

<button type="submit">Post Internship</button>

</form>

</section>


<footer>

<p>© 2026 InternHub</p>

</footer>


<!-- Apply Popup Form -->

<div id="applyPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">

<div style="background:white; padding:20px; width:320px; margin:100px auto; border-radius:10px; text-align:center;">

<h3>Apply for Internship</h3>

<form id="applyForm">

<input type="text" id="applicantName" placeholder="Your Name" required><br><br>

<input type="email" id="applicantEmail" placeholder="Your Email" required><br><br>

<input type="file" id="resume" required><br><br>

<button type="submit">Submit Application</button>

<button type="button" onclick="closeApply()">Cancel</button>

</form>

</div>

</div>


<script src="script.js"></script>

</body>

</html>
